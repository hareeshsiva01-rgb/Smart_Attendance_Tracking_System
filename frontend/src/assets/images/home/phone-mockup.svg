<svg width="100%" height="100%" viewBox="0 0 360 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Phone body -->
  <defs>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eef2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dbeafe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed7aa;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Phone frame with glow -->
  <rect x="15" y="20" width="330" height="680" rx="50" fill="none" stroke="url(#glowGradient)" stroke-width="1" opacity="0.3"/>
  
  <!-- Phone body -->
  <rect x="20" y="25" width="320" height="670" rx="48" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Status bar -->
  <rect x="30" y="40" width="300" height="8" rx="4" fill="#0f172a" opacity="0.08"/>
  
  <!-- Welcome header -->
  <rect x="30" y="70" width="300" height="50" rx="16" fill="#f3f4f6"/>
  <text x="40" y="95" font-family="Poppins" font-size="18" font-weight="700" fill="#0f172a">Welcome Back!</text>
  <text x="40" y="110" font-family="Poppins" font-size="12" fill="#6b7280">Mark your attendance</text>
  
  <!-- Status badge with face -->
  <rect x="250" y="75" width="70" height="40" rx="20" fill="#dbeafe"/>
  <circle cx="285" cy="95" r="12" fill="#3b82f6" opacity="0.2"/>
  <circle cx="285" cy="95" r="8" fill="#3b82f6"/>
  <text x="240" y="130" font-family="Poppins" font-size="10" fill="#3b82f6" font-weight="600">Present</text>

  <!-- Time display -->
  <text x="40" y="155" font-family="Poppins" font-size="12" fill="#6b7280">Check-In Time</text>
  <text x="40" y="175" font-family="Poppins" font-size="24" font-weight="700" fill="#0f172a">09:15 AM</text>
  
  <!-- Avatar placeholder -->
  <circle cx="295" cy="160" r="20" fill="#fecaca"/>
  <circle cx="295" cy="160" r="18" fill="#fee2e2"/>
  <circle cx="295" cy="160" r="3" fill="#0f172a" opacity="0.3"/>

  <!-- Feature cards row 1 -->
  <rect x="30" y="210" width="140" height="100" rx="16" fill="url(#cardGradient1)" stroke="#bfdbfe" stroke-width="1"/>
  <rect x="180" y="210" width="140" height="100" rx="16" fill="url(#cardGradient2)" stroke="#fde68a" stroke-width="1"/>
  
  <!-- Face Recognition icon -->
  <circle cx="55" cy="235" r="12" fill="#3b82f6" opacity="0.2"/>
  <text x="58" y="238" font-size="16">📷</text>
  <text x="40" y="260" font-family="Poppins" font-size="13" font-weight="600" fill="#0f172a">Face Recognition</text>
  <text x="40" y="300" font-family="Poppins" font-size="10" fill="#6b7280">Mark attendance</text>
  <text x="40" y="310" font-family="Poppins" font-size="10" fill="#6b7280">using Face ID</text>

  <!-- Geofencing icon -->
  <circle cx="205" cy="235" r="12" fill="#f59e0b" opacity="0.2"/>
  <text x="208" y="238" font-size="16">📍</text>
  <text x="190" y="260" font-family="Poppins" font-size="13" font-weight="600" fill="#0f172a">Geofencing</text>
  <text x="190" y="300" font-family="Poppins" font-size="10" fill="#6b7280">Location verified</text>
  <text x="190" y="310" font-family="Poppins" font-size="10" fill="#6b7280">attendance</text>

  <!-- Real-time status section -->
  <rect x="30" y="330" width="290" height="80" rx="16" fill="#faf5ff" stroke="#f3e8ff" stroke-width="1"/>
  <text x="40" y="350" font-family="Poppins" font-size="12" fill="#6b7280">Today's Status</text>
  <rect x="40" y="360" width="70" height="8" rx="4" fill="#22c55e" opacity="0.3"/>
  <rect x="40" y="360" width="56" height="8" rx="4" fill="#22c55e"/>
  <text x="120" y="366" font-family="Poppins" font-size="13" font-weight="600" fill="#0f172a">Present</text>
  
  <text x="40" y="395" font-family="Poppins" font-size="11" fill="#6b7280">Last 7 days</text>
  <text x="120" y="395" font-family="Poppins" font-size="11" fill="#0f172a" font-weight="600">6/7 Present</text>

  <!-- Mark Attendance CTA -->
  <rect x="30" y="430" width="290" height="50" rx="16" fill="url(#glowGradient)" stroke="url(#glowGradient)" stroke-width="1.5"/>
  <text x="175" y="464" font-family="Poppins" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Mark Attendance</text>
  
  <!-- Bottom nav indicators -->
  <circle cx="60" cy="650" r="6" fill="#7c3aed" opacity="0.8"/>
  <circle cx="180" cy="650" r="4" fill="#d1d5db"/>
  <circle cx="300" cy="650" r="4" fill="#d1d5db"/>
</svg>
